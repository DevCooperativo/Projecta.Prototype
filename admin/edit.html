<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar perfil — Projecta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

  <div id="navbar-placeholder"></div>

  <!-- Conteúdo principal -->
  <main class="container py-4">

    <div class="mb-4">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-1 small">
          <li class="breadcrumb-item"><a href="#" class="text-muted text-decoration-none">Início</a></li>
          <li class="breadcrumb-item"><a href="detail.html" class="text-muted text-decoration-none">Meu perfil</a></li>
          <li class="breadcrumb-item active" aria-current="page">Editar perfil</li>
        </ol>
      </nav>
      <h4 class="fw-bold mb-0">Editar perfil</h4>
    </div>

    <form id="adminForm" novalidate>
      <div class="row g-4">

        <!-- Coluna principal -->
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h6 class="fw-semibold mb-4 pb-2 border-bottom">Dados do perfil</h6>
              <div class="row g-3">

                <div class="col-12">
                  <label for="name" class="form-label fw-semibold small">
                    Nome <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    id="name"
                    name="name"
                    class="form-control"
                    required
                  >
                  <div class="invalid-feedback">Informe o nome.</div>
                </div>

                <div class="col-md-7">
                  <label for="email" class="form-label fw-semibold small">
                    E-mail institucional <span class="text-danger">*</span>
                  </label>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-control"
                    required
                  >
                  <div class="invalid-feedback">Informe um e-mail válido.</div>
                </div>

                <div class="col-md-5">
                  <label for="phone" class="form-label fw-semibold small">Telefone</label>
                  <input
                    type="tel"
                    id="phone"
                    name="phone"
                    class="form-control"
                    placeholder="Ex: (13) 3368-0000"
                  >
                </div>

                <div class="col-12">
                  <label for="role" class="form-label fw-semibold small">
                    Cargo <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    id="role"
                    name="role"
                    class="form-control"
                    placeholder="Ex: Coordenador de Pesquisa"
                    required
                  >
                  <div class="invalid-feedback">Informe o cargo.</div>
                </div>

              </div>
            </div>
          </div>
        </div>

        <!-- Coluna lateral -->
        <div class="col-lg-4">
          <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
              <h6 class="fw-semibold mb-3 pb-2 border-bottom">Conta</h6>
              <p class="text-muted small mb-2">Nível de acesso</p>
              <span class="badge bg-dark fw-normal">Administrador</span>
              <p class="text-muted small mb-2 mt-3">Instituição</p>
              <p class="small mb-0">Instituto Tecnológico do Litoral</p>
            </div>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-dark">Salvar alterações</button>
            <a href="detail.html" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </div>

      </div>
    </form>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/admin-data.js"></script>
  <script src="../js/admin-form.js"></script>
</body>
</html>
