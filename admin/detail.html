<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu perfil — Projecta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

  <div id="navbar-placeholder"></div>

  <!-- Conteúdo principal -->
  <main class="container py-4">

    <!-- Cabeçalho -->
    <div class="d-flex justify-content-between align-items-start mb-4">
      <div>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-1 small">
            <li class="breadcrumb-item"><a href="#" class="text-muted text-decoration-none">Início</a></li>
            <li class="breadcrumb-item active" aria-current="page">Meu perfil</li>
          </ol>
        </nav>
        <h4 class="fw-bold mb-0">Meu perfil</h4>
      </div>
      <a href="edit.html" class="btn btn-outline-dark btn-sm">Editar</a>
    </div>

    <div class="row g-4">

      <!-- Coluna principal -->
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <div class="d-flex align-items-center gap-4 mb-4 pb-3 border-bottom">
              <div
                id="avatarInitials"
                class="rounded-circle bg-dark text-white d-flex align-items-center justify-content-center fw-bold fs-4"
                style="width:64px;height:64px;flex-shrink:0"
              ></div>
              <div>
                <h6 class="fw-semibold mb-1" id="detailName">—</h6>
                <p class="text-muted small mb-0" id="detailEmail">—</p>
              </div>
            </div>
            <div class="row g-3">
              <div class="col-md-6">
                <p class="text-muted small mb-1">Cargo</p>
                <p class="fw-semibold mb-0" id="detailRole">—</p>
              </div>
              <div class="col-md-6">
                <p class="text-muted small mb-1">Telefone</p>
                <p class="mb-0" id="detailPhone">—</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Coluna lateral -->
      <div class="col-lg-4">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <h6 class="fw-semibold mb-4 pb-2 border-bottom">Conta</h6>
            <div class="d-flex flex-column gap-3">
              <div>
                <p class="text-muted small mb-1">Nível de acesso</p>
                <span class="badge bg-dark fw-normal">Administrador</span>
              </div>
              <div>
                <p class="text-muted small mb-1">Instituição</p>
                <p class="mb-0 small">Instituto Tecnológico do Litoral</p>
              </div>
              <div>
                <p class="text-muted small mb-1">Última atualização</p>
                <p class="mb-0 small" id="detailUpdatedAt">—</p>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Toast de feedback -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
    <div id="feedbackToast" class="toast align-items-center text-bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Fechar"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/admin-data.js"></script>
  <script src="../js/admin-detail.js"></script>
</body>
</html>
