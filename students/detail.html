<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aluno — Projecta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

  <div id="navbar-placeholder"></div>

  <!-- Conteúdo principal -->
  <main class="container py-4">

    <!-- Cabeçalho -->
    <div class="d-flex justify-content-between align-items-start mb-4">
      <div>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-1 small">
            <li class="breadcrumb-item"><a href="#" class="text-muted text-decoration-none">Início</a></li>
            <li class="breadcrumb-item"><a href="index.html" class="text-muted text-decoration-none">Alunos</a></li>
            <li class="breadcrumb-item active" id="breadcrumbName" aria-current="page">Aluno</li>
          </ol>
        </nav>
        <div class="d-flex align-items-center gap-2 mt-1 flex-wrap">
          <h4 class="fw-bold mb-0" id="pageTitle">—</h4>
          <span id="statusBadge"></span>
        </div>
      </div>
      <div class="d-flex gap-2">
        <a href="#" class="btn btn-outline-dark btn-sm" id="editBtn">Editar</a>
        <button class="btn btn-outline-danger btn-sm" id="deleteBtn">Excluir</button>
      </div>
    </div>

    <div class="row g-4">

      <!-- Coluna principal -->
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <div class="d-flex align-items-center gap-4 mb-4 pb-3 border-bottom">
              <div
                id="avatarInitials"
                class="rounded-circle bg-primary-subtle text-primary d-flex align-items-center justify-content-center fw-bold fs-4"
                style="width:64px;height:64px;flex-shrink:0"
              ></div>
              <div>
                <h6 class="fw-semibold mb-1" id="detailName">—</h6>
                <p class="text-muted small mb-0" id="detailEmail">—</p>
              </div>
            </div>
            <div class="row g-3">
              <div class="col-md-6">
                <p class="text-muted small mb-1">Matrícula</p>
                <p class="fw-semibold mb-0" id="detailRegistration">—</p>
              </div>
              <div class="col-md-6">
                <p class="text-muted small mb-1">Curso</p>
                <p class="mb-0" id="detailCourse">—</p>
              </div>
              <div class="col-12">
                <p class="text-muted small mb-1">Currículo Lattes</p>
                <p class="mb-0" id="detailLattes">—</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Coluna lateral -->
      <div class="col-lg-4">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <h6 class="fw-semibold mb-4 pb-2 border-bottom">Informações do registro</h6>
            <div class="d-flex flex-column gap-3">
              <div>
                <p class="text-muted small mb-1">Status</p>
                <span id="detailStatusInline">—</span>
              </div>
              <div>
                <p class="text-muted small mb-1">Projetos vinculados</p>
                <p class="fw-semibold mb-0" id="detailProjectCount">0</p>
              </div>
              <div>
                <p class="text-muted small mb-1">Empréstimos ativos</p>
                <p class="fw-semibold mb-0" id="detailLoanCount">0</p>
              </div>
              <div>
                <p class="text-muted small mb-1">Cadastrado em</p>
                <p class="mb-0 small" id="detailCreatedAt">—</p>
              </div>
              <div>
                <p class="text-muted small mb-1">Última atualização</p>
                <p class="mb-0 small" id="detailUpdatedAt">—</p>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Modal de exclusão -->
  <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-semibold" id="deleteModalLabel">Excluir aluno</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body py-3">
          <p class="text-muted mb-0" id="deleteModalBody"></p>
        </div>
        <div class="modal-footer border-0 pt-0" id="deleteModalFooter"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/student-data.js"></script>
  <script src="../js/student-detail.js"></script>
</body>
</html>
