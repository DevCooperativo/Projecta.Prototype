<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo aluno — Projecta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

  <div id="navbar-placeholder"></div>

  <!-- Conteúdo principal -->
  <main class="container py-4">

    <div class="mb-4">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-1 small">
          <li class="breadcrumb-item"><a href="#" class="text-muted text-decoration-none">Início</a></li>
          <li class="breadcrumb-item"><a href="index.html" class="text-muted text-decoration-none">Alunos</a></li>
          <li class="breadcrumb-item active" aria-current="page">Novo aluno</li>
        </ol>
      </nav>
      <h4 class="fw-bold mb-0">Novo aluno</h4>
    </div>

    <form id="studentForm" novalidate>
      <div class="row g-4">

        <!-- Coluna principal -->
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h6 class="fw-semibold mb-4 pb-2 border-bottom">Dados do aluno</h6>
              <div class="row g-3">

                <div class="col-12">
                  <label for="name" class="form-label fw-semibold small">
                    Nome completo <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    id="name"
                    name="name"
                    class="form-control"
                    placeholder="Ex: Lucas Ferri Viana"
                    required
                  >
                  <div class="invalid-feedback">Informe o nome completo do aluno.</div>
                </div>

                <div class="col-md-7">
                  <label for="email" class="form-label fw-semibold small">
                    E-mail institucional <span class="text-danger">*</span>
                  </label>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-control"
                    placeholder="Ex: nome@aluno.itl.edu.br"
                    required
                  >
                  <div class="invalid-feedback">Informe um e-mail válido.</div>
                </div>

                <div class="col-md-5">
                  <label for="registration" class="form-label fw-semibold small">
                    Matrícula <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    id="registration"
                    name="registration"
                    class="form-control"
                    placeholder="Ex: 2024001234"
                    required
                  >
                  <div class="invalid-feedback">Informe a matrícula do aluno.</div>
                </div>

                <div class="col-12">
                  <label for="course" class="form-label fw-semibold small">
                    Curso <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    id="course"
                    name="course"
                    class="form-control"
                    placeholder="Ex: Análise e Desenvolvimento de Sistemas"
                    required
                  >
                  <div class="invalid-feedback">Informe o curso do aluno.</div>
                </div>

                <div class="col-12">
                  <label for="lattes" class="form-label fw-semibold small">Currículo Lattes</label>
                  <input
                    type="url"
                    id="lattes"
                    name="lattes"
                    class="form-control"
                    placeholder="Ex: http://lattes.cnpq.br/0000000000000000"
                  >
                  <div class="form-text">Opcional. Informe a URL completa do currículo Lattes.</div>
                </div>

              </div>
            </div>
          </div>
        </div>

        <!-- Coluna lateral -->
        <div class="col-lg-4">
          <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
              <h6 class="fw-semibold mb-4 pb-2 border-bottom">Configurações</h6>
              <label class="form-label fw-semibold small">Status <span class="text-danger">*</span></label>
              <div class="d-flex flex-column gap-2">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="status" id="statusActive" value="active" checked>
                  <label class="form-check-label" for="statusActive">Ativo</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="status" id="statusInactive" value="inactive">
                  <label class="form-check-label" for="statusInactive">Inativo</label>
                </div>
              </div>
            </div>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-dark">Salvar aluno</button>
            <a href="index.html" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </div>

      </div>
    </form>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/student-data.js"></script>
  <script src="../js/student-form.js"></script>
</body>
</html>
