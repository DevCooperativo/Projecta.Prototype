<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar laboratorio - Projecta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

  <div id="navbar-placeholder"></div>

  <main class="container py-4">

    <div class="mb-4">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-1 small">
          <li class="breadcrumb-item"><a href="#" class="text-muted text-decoration-none">Inicio</a></li>
          <li class="breadcrumb-item"><a href="index.html" class="text-muted text-decoration-none">Laboratorios</a></li>
          <li class="breadcrumb-item"><a href="#" class="text-muted text-decoration-none" id="breadcrumbDetailLink">Laboratorio</a></li>
          <li class="breadcrumb-item active" aria-current="page">Editar</li>
        </ol>
      </nav>
      <h4 class="fw-bold mb-0">Editar laboratorio</h4>
    </div>

    <form id="labForm" novalidate>
      <div class="row g-4">

        <div class="col-lg-8">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h6 class="fw-semibold mb-4 pb-2 border-bottom">Dados do laboratorio</h6>
              <div class="row g-3">

                <div class="col-md-8">
                  <label for="name" class="form-label fw-semibold small">
                    Nome <span class="text-danger">*</span>
                  </label>
                  <input type="text" id="name" name="name" class="form-control" placeholder="Ex: Laboratorio de Computacao Aplicada" required>
                  <div class="invalid-feedback">Informe o nome do laboratorio.</div>
                </div>

                <div class="col-md-4">
                  <label for="acronym" class="form-label fw-semibold small">
                    Sigla <span class="text-danger">*</span>
                  </label>
                  <input type="text" id="acronym" name="acronym" class="form-control text-uppercase" placeholder="Ex: LCA" maxlength="10" required>
                  <div class="invalid-feedback">Informe a sigla.</div>
                </div>

                <div class="col-md-4">
                  <label for="block" class="form-label fw-semibold small">
                    Bloco <span class="text-danger">*</span>
                  </label>
                  <select id="block" name="block" class="form-select" required>
                    <option value="">Selecione...</option>
                  </select>
                  <div class="invalid-feedback">Selecione o bloco do laboratorio.</div>
                </div>

                <div class="col-md-4">
                  <label for="room" class="form-label fw-semibold small">
                    Sala <span class="text-danger">*</span>
                  </label>
                  <input type="text" id="room" name="room" class="form-control" placeholder="Ex: 204" maxlength="20" required>
                  <div class="invalid-feedback">Informe a sala.</div>
                </div>

                <div class="col-md-4">
                  <label for="capacity" class="form-label fw-semibold small">
                    Capacidade <span class="text-danger">*</span>
                  </label>
                  <input type="number" id="capacity" name="capacity" class="form-control" min="1" max="99" placeholder="Ex: 30" required>
                  <div class="invalid-feedback">Informe uma capacidade valida.</div>
                </div>

                <div class="col-12">
                  <label for="responsible" class="form-label fw-semibold small">
                    Responsavel <span class="text-danger">*</span>
                  </label>
                  <input type="text" id="responsible" name="responsible" class="form-control" placeholder="Ex: Prof. Dr. Marco Antonio Silva" required>
                  <div class="invalid-feedback">Informe o responsavel pelo laboratorio.</div>
                </div>

                <div class="col-12">
                  <label for="description" class="form-label fw-semibold small">Descricao</label>
                  <textarea id="description" name="description" class="form-control" rows="3" placeholder="Descreva brevemente a finalidade e os recursos principais deste laboratorio..."></textarea>
                </div>

              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
              <h6 class="fw-semibold mb-4 pb-2 border-bottom">Configuracoes</h6>
              <label class="form-label fw-semibold small">Status <span class="text-danger">*</span></label>
              <div class="d-flex flex-column gap-2">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="status" id="statusActive" value="active">
                  <label class="form-check-label" for="statusActive">Ativo</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="status" id="statusMaintenance" value="maintenance">
                  <label class="form-check-label" for="statusMaintenance">Em manutencao</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="status" id="statusInactive" value="inactive">
                  <label class="form-check-label" for="statusInactive">Inativo</label>
                </div>
              </div>
            </div>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-dark">Salvar alteracoes</button>
            <a href="#" class="btn btn-outline-secondary" id="cancelBtn">Cancelar</a>
          </div>
        </div>

      </div>
    </form>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/lab-data.js"></script>
  <script src="../js/lab-form.js"></script>
</body>
</html>
