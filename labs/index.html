<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorios - Projecta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

  <div id="navbar-placeholder"></div>

  <main class="container py-4">

    <div class="d-flex justify-content-between align-items-start mb-4">
      <div>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-1 small">
            <li class="breadcrumb-item"><a href="#" class="text-muted text-decoration-none">Inicio</a></li>
            <li class="breadcrumb-item active" aria-current="page">Laboratorios</li>
          </ol>
        </nav>
        <h4 class="fw-bold mb-0">Laboratorios</h4>
      </div>
      <a href="new.html" class="btn btn-dark">Novo laboratorio</a>
    </div>

    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-5">
            <label for="searchInput" class="form-label small fw-semibold text-muted mb-1">Buscar</label>
            <input type="search" id="searchInput" class="form-control" placeholder="Nome, sigla ou responsavel..." autocomplete="off">
          </div>
          <div class="col-md-2">
            <label for="blockFilter" class="form-label small fw-semibold text-muted mb-1">Bloco</label>
            <select id="blockFilter" class="form-select">
              <option value="">Todos</option>
            </select>
          </div>
          <div class="col-md-3">
            <label for="statusFilter" class="form-label small fw-semibold text-muted mb-1">Status</label>
            <select id="statusFilter" class="form-select">
              <option value="">Todos</option>
              <option value="active">Ativo</option>
              <option value="maintenance">Em manutencao</option>
              <option value="inactive">Inativo</option>
            </select>
          </div>
          <div class="col-md-2">
            <button type="button" id="clearFiltersBtn" class="btn btn-outline-secondary w-100">Limpar filtros</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light border-bottom">
              <tr>
                <th class="ps-4 py-3 fw-semibold small text-muted">Laboratorio</th>
                <th class="py-3 fw-semibold small text-muted">Localizacao</th>
                <th class="py-3 fw-semibold small text-muted">Responsavel</th>
                <th class="py-3 fw-semibold small text-muted">Status</th>
                <th class="py-3 fw-semibold small text-muted text-end pe-4">Acoes</th>
              </tr>
            </thead>
            <tbody id="labTableBody"></tbody>
          </table>
        </div>
      </div>
      <div class="card-footer bg-white border-top d-flex justify-content-between align-items-center py-3 px-4">
        <small class="text-muted" id="tableInfo"></small>
        <nav aria-label="Paginacao">
          <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
        </nav>
      </div>
    </div>

  </main>

  <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-semibold" id="deleteModalLabel">Excluir laboratorio</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body py-3">
          <p class="text-muted mb-0" id="deleteModalBody">
            Tem certeza que deseja excluir <strong id="deleteTargetName"></strong>?
            Esta acao nao pode ser desfeita.
          </p>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Excluir</button>
        </div>
      </div>
    </div>
  </div>

  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
    <div id="feedbackToast" class="toast align-items-center text-bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Fechar"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/lab-data.js"></script>
  <script src="../js/lab-list.js"></script>
</body>
</html>
