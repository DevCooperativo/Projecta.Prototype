<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empréstimos — Projecta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

  <div id="navbar-placeholder"></div>

  <!-- Conteúdo principal -->
  <main class="container py-4">

    <!-- Cabeçalho -->
    <div class="d-flex justify-content-between align-items-start mb-4">
      <div>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-1 small">
            <li class="breadcrumb-item"><a href="#" class="text-muted text-decoration-none">Início</a></li>
            <li class="breadcrumb-item active" aria-current="page">Empréstimos</li>
          </ol>
        </nav>
        <h4 class="fw-bold mb-0">Empréstimos</h4>
      </div>
      <a href="new.html" class="btn btn-dark">Novo empréstimo</a>
    </div>

    <!-- Filtros -->
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-4">
            <label for="searchInput" class="form-label small fw-semibold text-muted mb-1">Buscar</label>
            <input type="search" id="searchInput" class="form-control" placeholder="Equipamento ou tomador..." autocomplete="off">
          </div>
          <div class="col-md-2">
            <label for="typeFilter" class="form-label small fw-semibold text-muted mb-1">Tipo de tomador</label>
            <select id="typeFilter" class="form-select">
              <option value="">Todos</option>
              <option value="professor">Professor</option>
              <option value="student">Aluno</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="statusFilter" class="form-label small fw-semibold text-muted mb-1">Status</label>
            <select id="statusFilter" class="form-select">
              <option value="">Todos</option>
              <option value="pending">Pendente</option>
              <option value="completed">Concluído</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="dateFrom" class="form-label small fw-semibold text-muted mb-1">Início de</label>
            <input type="date" id="dateFrom" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="dateTo" class="form-label small fw-semibold text-muted mb-1">Início até</label>
            <input type="date" id="dateTo" class="form-control">
          </div>
        </div>
        <div class="row mt-2">
          <div class="col-12 d-flex justify-content-end">
            <button type="button" id="clearFiltersBtn" class="btn btn-sm btn-outline-secondary">Limpar filtros</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabela -->
    <div class="card border-0 shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light border-bottom">
              <tr>
                <th class="ps-4 py-3 fw-semibold small text-muted">Equipamento</th>
                <th class="py-3 fw-semibold small text-muted">Tomador</th>
                <th class="py-3 fw-semibold small text-muted">Início</th>
                <th class="py-3 fw-semibold small text-muted">Devolução prevista</th>
                <th class="py-3 fw-semibold small text-muted">Status</th>
                <th class="py-3 fw-semibold small text-muted text-end pe-4">Ação</th>
              </tr>
            </thead>
            <tbody id="loanTableBody"></tbody>
          </table>
        </div>
      </div>
      <div class="card-footer bg-white border-top d-flex justify-content-between align-items-center py-3 px-4">
        <small class="text-muted" id="tableInfo"></small>
        <nav aria-label="Paginação">
          <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
        </nav>
      </div>
    </div>

  </main>

  <!-- Toast de feedback -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
    <div id="feedbackToast" class="toast align-items-center text-bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Fechar"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/loan-data.js"></script>
  <script src="../js/loan-list.js"></script>
</body>
</html>
